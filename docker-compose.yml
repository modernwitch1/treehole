# 本地开发依赖：Postgres + Redis + MinIO (S3 mock) + Maildev (SMTP mock)
# 启动: docker compose up -d
# 关停: docker compose down            (保留数据)
#       docker compose down -v          (清空数据)

services:
  postgres:
    image: postgres:16-alpine
    container_name: forum-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: forum
      POSTGRES_USER: forum
      POSTGRES_PASSWORD: forum_dev_password
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --lc-collate=C --lc-ctype=C'
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U forum -d forum']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: forum-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: forum-minio
    restart: unless-stopped
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: local-dev-key
      MINIO_ROOT_PASSWORD: local-dev-secret
    ports:
      - '9000:9000' # S3 API
      - '9001:9001' # Console
    volumes:
      - minio-data:/data
    # NOTE: minio 镜像里没有 mc/curl/wget，无法做内置应用层 healthcheck。
    # minio-init 自己 retry 等待 (见下)。

  minio-init:
    image: minio/mc:latest
    container_name: forum-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
        until (mc alias set local http://minio:9000 local-dev-key local-dev-secret) do
          echo 'waiting for minio…' && sleep 1;
        done;
        mc mb --ignore-existing local/zjgsu-forum-uploads;
        mc mb --ignore-existing local/zjgsu-forum-avatars;
        mc anonymous set download local/zjgsu-forum-uploads;
        mc anonymous set download local/zjgsu-forum-avatars;
        echo '✅ MinIO buckets ready.';
      "

  maildev:
    image: maildev/maildev:latest
    container_name: forum-maildev
    restart: unless-stopped
    environment:
      MAILDEV_INCOMING_USER: ''
      MAILDEV_INCOMING_PASS: ''
    ports:
      - '1025:1025' # SMTP
      - '1080:1080' # Web UI: http://localhost:1080

volumes:
  postgres-data:
  redis-data:
  minio-data:
